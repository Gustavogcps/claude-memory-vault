name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. The fields below preempt the most common back-and-forth.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. 15.5 (Sequoia)"
    validations:
      required: true
  - type: textarea
    id: rsync
    attributes:
      label: Output of `/usr/bin/rsync --version | head -2`
      description: This tool requires openrsync (macOS 15+). macOS 14 ships GNU rsync and is refused by design.
      render: shell
    validations:
      required: true
  - type: input
    id: vault
    attributes:
      label: Configured vault path
      placeholder: "e.g. ~/Claude Vault"
  - type: textarea
    id: log
    attributes:
      label: Relevant log excerpt
      description: From `~/.claude/logs/mirror-drift.log` or `mirror-drift.archive.log`, if any.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I ran `tests/run-tests.sh` and noted whether it passed
        - label: I reviewed the rendered scripts in `~/.claude/hooks/`
