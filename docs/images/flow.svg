<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="820" height="280" fill="#0d1117"/>
  <text x="410" y="42" fill="#e6edf3" font-size="22" font-weight="700" text-anchor="middle">claude-memory-vault</text>
  <text x="410" y="68" fill="#7d8590" font-size="14" text-anchor="middle">one-way mirror · your memory is never written to</text>

  <!-- source box -->
  <rect x="60" y="110" width="280" height="120" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="200" y="138" fill="#58a6ff" font-size="14" font-weight="600" text-anchor="middle">Claude Code memory</text>
  <text x="200" y="166" fill="#8b949e" font-size="12" text-anchor="middle" font-family="monospace">MEMORY.md</text>
  <text x="200" y="186" fill="#8b949e" font-size="12" text-anchor="middle" font-family="monospace">note-a.md</text>
  <text x="200" y="206" fill="#8b949e" font-size="12" text-anchor="middle" font-family="monospace">note-b.md</text>

  <!-- dest box -->
  <rect x="480" y="110" width="280" height="120" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="620" y="138" fill="#a371f7" font-size="14" font-weight="600" text-anchor="middle">Obsidian vault</text>
  <text x="620" y="166" fill="#8b949e" font-size="12" text-anchor="middle" font-family="monospace">Claude/Memory/…</text>
  <text x="620" y="190" fill="#6e7681" font-size="11" text-anchor="middle">visible · searchable · in your graph</text>

  <!-- forward arrow -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3fb950"/>
    </marker>
  </defs>
  <line x1="345" y1="158" x2="470" y2="158" stroke="#3fb950" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="407" y="148" fill="#3fb950" font-size="12" text-anchor="middle" font-weight="600">rsync</text>

  <!-- blocked reverse arrow -->
  <line x1="470" y1="196" x2="355" y2="196" stroke="#f85149" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="412" y="216" fill="#f85149" font-size="12" text-anchor="middle" font-weight="600">✗ never</text>
</svg>
